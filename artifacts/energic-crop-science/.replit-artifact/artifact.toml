kind = "web"
previewPath = "/"
title = "Energic Crop Science"
version = "1.0.0"
id = "artifacts/energic-crop-science"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19802

[services.development]
run = "pnpm --filter @workspace/energic-crop-science run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/energic-crop-science", "run", "build" ]
publicDir = "artifacts/energic-crop-science/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19802"
BASE_PATH = "/"
